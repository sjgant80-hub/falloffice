<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>◊ FallOffice · sovereign office suite · words · sheets · slides · mail · calendar · notes · tasks</title>
<meta name="description" content="Sovereign Microsoft 365 alternative. Single HTML, no server, no subscription. Words · Sheets · Slides · Mail · Calendar · Notes · Tasks · plus an Ω orchestrator with autopilot.">
<meta name="prime" content="7">
<meta name="theme-color" content="#0b0a0f">
<link rel="manifest" href='data:application/manifest+json,{"name":"FallOffice","short_name":"office","start_url":"./","display":"standalone","background_color":"%230b0a0f","theme_color":"%23ff8c00","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%230b0a0f%27 rx=%2728%27/><text x=%2796%27 y=%27132%27 font-family=%27Georgia, serif%27 font-size=%27108%27 font-weight=%27700%27 text-anchor=%27middle%27 fill=%27%23ff8c00%27>◊</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
:root{
  --void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;
  --line:#2a2934;--line-soft:#1f1e28;
  --cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;
  --brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;
  --green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;
  --serif:Georgia,'Libre Baskerville',ui-serif,serif;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
textarea{resize:vertical;line-height:1.5;font-family:var(--sans)}
a{color:var(--amber);text-decoration:none}
a:hover{text-decoration:underline}

/* ── shell ── */
.app{display:grid;grid-template-rows:48px 1fr;height:100dvh}
header{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}
.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}
.brand .mark{width:26px;height:26px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:14px;letter-spacing:0.02em}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase;margin-left:4px}

nav.apps{display:flex;flex:1;overflow-x:auto;align-items:stretch}
nav.apps button{padding:0 14px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent;border-bottom:2px solid transparent}
nav.apps button:hover{background:var(--ink);color:var(--cream)}
nav.apps button.active{background:var(--ink);color:var(--amber);border-top-color:var(--amber)}
nav.apps button .ico{font-family:var(--serif);font-size:14px}

.tools{display:flex;align-items:center;gap:4px;padding:0 12px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:6px 10px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
.tool-btn.primary{background:var(--amber);color:var(--void);border-color:var(--amber);font-weight:600}
.tool-btn.primary:hover{background:var(--brass);border-color:var(--brass)}
.tool-btn.tier-t3{border-color:var(--blue);color:var(--blue)}

main{overflow:auto;background:var(--void)}
.view{padding:18px 22px;height:100%}
.view-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}
.view-hd h2{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:0.01em}
.view-hd .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.view-hd .actions{display:flex;gap:6px}

.btn{padding:7px 13px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);letter-spacing:0.04em;background:transparent}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--amber);color:var(--void);border-color:var(--amber);font-weight:600}
.btn.primary:hover{background:var(--brass);border-color:var(--brass)}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.btn.sm{padding:4px 9px;font-size:11px}

.empty{padding:50px 20px;text-align:center;color:var(--cream-muted);font-size:13px;font-style:italic}
.empty .big{font-size:32px;margin-bottom:10px;opacity:0.4;font-family:var(--serif);font-style:normal}

.layout{display:grid;grid-template-columns:260px 1fr;gap:14px;height:calc(100vh - 100px);min-height:0}
.side{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:10px;overflow:auto;min-height:0}
.side h3{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.18em;text-transform:uppercase;margin:8px 6px 6px;padding-top:6px;border-top:1px dashed var(--line-soft)}
.side h3:first-child{border-top:none;padding-top:0}
.side .item{padding:8px 10px;border-radius:3px;cursor:pointer;font-size:13px;margin-bottom:2px;border-left:2px solid transparent}
.side .item:hover{background:var(--ink)}
.side .item.active{background:var(--ink);border-left-color:var(--amber);color:var(--amber)}
.side .item .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted);margin-top:2px;letter-spacing:0.04em}
.pane{background:var(--void-2);border:1px solid var(--line);border-radius:4px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.pane-hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.pane-bd{flex:1;overflow:auto;padding:14px;min-height:0}

/* ── WORDS ── */
.words-tool{display:flex;flex-wrap:wrap;gap:3px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--ink);font-family:var(--mono);font-size:11px}
.words-tool button{padding:4px 9px;border-radius:2px;color:var(--cream-dim);font-weight:600;letter-spacing:0.04em}
.words-tool button:hover{background:var(--void);color:var(--amber)}
.words-tool .sep{width:1px;height:14px;background:var(--line);margin:0 4px}
.words-tool input[type=text]{height:24px;padding:2px 6px;font-size:11px;background:var(--void)}
.words-doc{padding:30px 60px;font-family:var(--serif);font-size:15px;line-height:1.7;min-height:100%;color:var(--cream);outline:none}
.words-doc h1{font-size:28px;margin:14px 0 10px;font-weight:600}
.words-doc h2{font-size:22px;margin:12px 0 8px;font-weight:600}
.words-doc h3{font-size:18px;margin:10px 0 6px;font-weight:600;color:var(--brass)}
.words-doc p{margin-bottom:12px}
.words-doc ul,.words-doc ol{margin:8px 0 12px 24px}
.words-doc blockquote{border-left:3px solid var(--brass);padding-left:14px;margin:10px 0;color:var(--cream-dim);font-style:italic}
.words-doc code{background:var(--ink);padding:1px 5px;border-radius:2px;font-family:var(--mono);font-size:13px;color:var(--amber)}
.words-doc pre{background:var(--ink);padding:10px 14px;border-radius:3px;font-family:var(--mono);font-size:12px;overflow-x:auto;margin:10px 0}

/* ── SHEETS ── */
.sheet-wrap{overflow:auto;height:100%}
table.sheet{border-collapse:collapse;font-family:var(--mono);font-size:12px}
.sheet th,.sheet td{border:1px solid var(--line);padding:0;background:var(--void)}
.sheet th{background:var(--ink);color:var(--brass);font-weight:600;text-align:center;padding:4px 8px;font-size:10px;letter-spacing:0.06em;min-width:88px;position:sticky;top:0;z-index:2}
.sheet th.row-h{position:sticky;left:0;z-index:3;width:42px;min-width:42px}
.sheet td{height:24px;position:relative;overflow:hidden}
.sheet td.row-h{background:var(--ink);color:var(--brass);text-align:center;font-weight:600;font-size:10px;width:42px;min-width:42px;position:sticky;left:0;z-index:1}
.sheet td input{width:100%;height:100%;border:none;border-radius:0;background:transparent;color:var(--cream);padding:3px 6px;font-family:var(--mono);font-size:12px}
.sheet td input:focus{background:var(--ink);outline:1px solid var(--amber);outline-offset:-1px;z-index:5;position:relative}
.sheet td.formula{color:var(--green)}
.sheet td.err{color:var(--red)}
.sheet-fxbar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--line);background:var(--ink);font-family:var(--mono);font-size:12px}
.sheet-fxbar .cell-ref{color:var(--brass);font-weight:600;min-width:48px}
.sheet-fxbar input{flex:1;background:var(--void)}

/* ── SLIDES ── */
.slide-list{display:flex;flex-direction:column;gap:4px}
.slide-list .item{padding:10px;background:var(--ink);border-radius:3px;font-size:12px;border-left:2px solid var(--line)}
.slide-list .item.active{border-left-color:var(--amber);background:var(--void)}
.slide-list .item .n{font-family:var(--mono);font-size:10px;color:var(--brass);margin-right:6px}
.slide-edit textarea{width:100%;min-height:160px;font-size:13px;line-height:1.6}
.slide-preview{aspect-ratio:16/9;background:var(--void);border:1px solid var(--line);border-radius:4px;padding:40px 50px;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;margin-top:10px}
.slide-preview h1{font-family:var(--serif);font-size:34px;color:var(--amber);margin-bottom:18px;font-weight:600}
.slide-preview .body{font-family:var(--serif);font-size:18px;color:var(--cream);line-height:1.6}
.slide-preview .body ul{margin-left:24px}
.slide-preview .body li{margin-bottom:6px}

/* ── MAIL ── */
.mail-field{display:grid;grid-template-columns:80px 1fr;gap:10px;margin-bottom:10px;align-items:center}
.mail-field label{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.mail-field input,.mail-field textarea{width:100%}
.mail-body{min-height:300px;font-family:var(--serif);font-size:14px;line-height:1.6}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:3px}
.cal-cell{background:var(--void-2);min-height:90px;padding:6px;font-size:12px;cursor:pointer;position:relative}
.cal-cell:hover{background:var(--ink)}
.cal-cell .d{font-family:var(--mono);font-size:11px;color:var(--cream-muted);margin-bottom:4px}
.cal-cell.today .d{color:var(--amber);font-weight:700}
.cal-cell.other-month{opacity:0.35}
.cal-cell .ev{background:var(--brass);color:var(--void);padding:2px 5px;border-radius:2px;font-size:10px;margin-top:2px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-bottom:none;border-radius:3px 3px 0 0}
.cal-header div{background:var(--ink);padding:8px;font-family:var(--mono);font-size:10px;color:var(--brass);text-align:center;letter-spacing:0.1em;text-transform:uppercase}

/* ── NOTES, TASKS ── */
.note-card,.task-card{background:var(--ink);padding:10px 12px;border-radius:3px;margin-bottom:6px;border-left:2px solid var(--brass)}
.note-card .title{font-weight:600;font-size:13px;color:var(--cream);margin-bottom:3px}
.note-card .tags{font-family:var(--mono);font-size:10px;color:var(--brass);letter-spacing:0.04em}
.task-card{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center}
.task-card.done{opacity:0.5}
.task-card.done .title{text-decoration:line-through}
.task-card input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--amber)}
.task-card .title{font-size:13px}
.task-card .meta{font-family:var(--mono);font-size:10px;color:var(--cream-muted)}
.task-card.p1{border-left-color:var(--red)}
.task-card.p2{border-left-color:var(--yellow)}
.task-card.p3{border-left-color:var(--cream-muted)}

/* ── CMD PALETTE ── */
.palette-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:1000;backdrop-filter:blur(4px)}
.palette-bg.open{display:flex}
.palette{background:var(--void-2);border:1px solid var(--brass);border-radius:6px;width:min(640px,90%);box-shadow:0 18px 50px rgba(0,0,0,0.7);overflow:hidden}
.palette-hd{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.palette-hd .glyph{font-family:var(--serif);font-size:20px;color:var(--amber)}
.palette-hd input{flex:1;border:none;background:transparent;font-size:15px;padding:4px}
.palette-hd input:focus{outline:none}
.palette-hd .badge{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase}
.palette-bd{max-height:50vh;overflow:auto;padding:8px}
.palette-row{padding:9px 12px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13px}
.palette-row:hover,.palette-row.sel{background:var(--ink)}
.palette-row .ico{font-family:var(--serif);font-size:16px;color:var(--amber);width:22px;text-align:center}
.palette-row .desc{color:var(--cream-muted);font-size:11px;margin-top:2px}
.palette-row .key{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--cream-muted);background:var(--void);padding:2px 6px;border-radius:2px;letter-spacing:0.06em}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:5px;padding:22px;max-width:540px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.modal .field input,.modal .field textarea,.modal .field select{width:100%}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--amber);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:760px){
  .layout{grid-template-columns:1fr;height:auto}
  .side{max-height:200px}
  .words-doc{padding:18px 14px}
  nav.apps button{padding:0 10px;font-size:11px}
  .brand .seal{display:none}
}
</style>
</head>
<body>

<div class="app">
<header>
  <div class="brand">
    <div class="mark">◊</div>
    <div>
      <div class="name">FallOffice</div>
    </div>
    <div class="seal">v2 · prime 7</div>
  </div>
  <nav class="apps" id="appNav"></nav>
  <div class="tools">
    <button class="tool-btn primary" onclick="openPalette()" title="autopilot · Ctrl+K">◊ autopilot</button>
    <button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button>
    <button class="tool-btn" onclick="openModal('settings')" title="settings">⚙</button>
  </div>
</header>

<main id="view"></main>
</div>

<!-- CMD PALETTE -->
<div class="palette-bg" id="palette">
  <div class="palette">
    <div class="palette-hd">
      <span class="glyph">Ω</span>
      <input type="text" id="pInput" placeholder="say what you want · Ω will route it · e.g. 'draft a quote for Acme £2400' or 'spreadsheet for monthly expenses'">
      <span class="badge" id="pTier">T0</span>
    </div>
    <div class="palette-bd" id="pBody"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modalTitle">·</h2>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast">·</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
// FallOffice v2 · sovereign office suite
// 7-app suite + Ω orchestrator · single HTML · prime 7 · MIT
// ════════════════════════════════════════════════════════════════

const VERSION='2.0.0';const PRIME=7;const STORE='falloffice-v2';

const APPS=[
  {id:'words',name:'Words',ico:'¶',hint:'documents'},
  {id:'sheets',name:'Sheets',ico:'⊞',hint:'spreadsheets'},
  {id:'slides',name:'Slides',ico:'❏',hint:'decks'},
  {id:'mail',name:'Mail',ico:'✉',hint:'drafts'},
  {id:'cal',name:'Calendar',ico:'☐',hint:'events'},
  {id:'notes',name:'Notes',ico:'≡',hint:'markdown'},
  {id:'tasks',name:'Tasks',ico:'✓',hint:'todos'}
];

let state={
  active:'words',
  words:{docs:[],activeId:null},
  sheets:{books:[],activeId:null,activeCell:'A1'},
  slides:{decks:[],activeId:null,activeIdx:0},
  mail:{drafts:[],activeId:null},
  cal:{events:[],year:null,month:null},
  notes:{notes:[],activeId:null,filter:''},
  tasks:{tasks:[],filter:'all'},
  settings:{rateTier:'mid',anthropicKey:'',openaiKey:'',geminiKey:'',openrouterKey:''}
};

// ── util ──
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>Array.from(p.querySelectorAll(s));
const uid=()=>'_'+Math.random().toString(36).slice(2,11);
const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate=d=>{const x=new Date(d);return x.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})};
const fmtDT=d=>{const x=new Date(d);return x.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})};

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1700)}

// ── IDB ──
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(STORE,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('s'))d.createObjectStore('s')};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=rej})}
async function saveAll(){if(!db)await openDB();return new Promise(res=>{const tx=db.transaction('s','readwrite');tx.objectStore('s').put(state,'state');tx.oncomplete=res})}
async function loadAll(){if(!db)await openDB();return new Promise(res=>{const tx=db.transaction('s','readonly');const r=tx.objectStore('s').get('state');r.onsuccess=()=>{if(r.result){state=Object.assign(state,r.result);// re-merge sub-defaults if older state
      ['words','sheets','slides','mail','cal','notes','tasks','settings'].forEach(k=>{state[k]=Object.assign({},getDefaults()[k],state[k]||{})})}res()}})}
function getDefaults(){return{words:{docs:[],activeId:null},sheets:{books:[],activeId:null,activeCell:'A1'},slides:{decks:[],activeId:null,activeIdx:0},mail:{drafts:[],activeId:null},cal:{events:[],year:null,month:null},notes:{notes:[],activeId:null,filter:''},tasks:{tasks:[],filter:'all'},settings:{rateTier:'mid',anthropicKey:'',openaiKey:'',geminiKey:'',openrouterKey:''}}}

// ── CASCADE (T0/T2/T3) ──
const Cascade={
  async detectTier(){if(await this._probe())return'T2';const s=state.settings;if(s.anthropicKey||s.openaiKey||s.geminiKey||s.openrouterKey)return'T3';return'T0'},
  async _probe(){if(this._p!==undefined)return this._p;try{this._p=await Promise.race([fetch('http://127.0.0.1:11434/api/tags').then(r=>r.ok),new Promise(r=>setTimeout(()=>r(false),350))])}catch(e){this._p=false}return this._p},
  async generate(sys,user,maxTok){const s=state.settings,max=maxTok||1200;

const ROUTES=[
  {app:'words',verbs:/\b(draft|write|letter|memo|propos|quote|brief|doc|content|article|blog|notes? for|report)\b/i,hint:'document'},
  {app:'sheets',verbs:/\b(spreadsheet|sheet|table|budget|expens|invoice list|track|calculator|p&l|cashflow)\b/i,hint:'spreadsheet'},
  {app:'slides',verbs:/\b(deck|slides|presentation|pitch|talk|keynote)\b/i,hint:'deck'},
  {app:'mail',verbs:/\b(email|mail|message|reach out|reply|follow.?up)\b/i,hint:'email'},
  {app:'cal',verbs:/\b(meeting|appointment|schedule|book|calendar|event)\b/i,hint:'event'},
  {app:'notes',verbs:/\b(note|jot|capture|idea|thought|remember)\b/i,hint:'note'},
  {app:'tasks',verbs:/\b(todo|task|reminder|to.?do|chore|list)\b/i,hint:'task'}
];
async function omegaRoute(intent){
  // T0 verb match
  let app=null;
  for(const r of ROUTES){if(r.verbs.test(intent)){app=r.app;break}}
  // T3 sharpening
  const tier=await Cascade.detectTier();
  if(tier!=='T0'){
    const sys='You are Ω, the orchestrator of the FallOffice suite. Apps available: words (documents), sheets (spreadsheets), slides (decks), mail (drafts), cal (calendar events), notes (markdown notes), tasks (todos). Return ONLY a JSON object: {"app":"<app id>","title":"<short title>","body":"<the content the user wants generated · markdown · concise>"}. The body MUST be the actual generated artefact, not a description of it.';
    try{const r=await Cascade.generate(sys,intent,1400);const m=r.text?.match(/\{[\s\S]*\}/);if(m){const p=JSON.parse(m[0]);if(p.app&&APPS.find(a=>a.id===p.app))return{app:p.app,title:p.title||intent.slice(0,50),body:p.body||''}}}catch(e){}
  }
  if(!app)app='words';
  return{app,title:intent.slice(0,50),body:''}
}

function mdToHtml(md){return md.split(/\n\n+/).map(p=>{p=p.trim();if(!p)return'';if(p.startsWith('# '))return'<h1>'+esc(p.slice(2))+'</h1>';if(p.startsWith('## '))return'<h2>'+esc(p.slice(3))+'</h2>';if(p.startsWith('### '))return'<h3>'+esc(p.slice(4))+'</h3>';if(p.startsWith('> '))return'<blockquote>'+esc(p.slice(2))+'</blockquote>';if(p.match(/^[-*]\s/m))return'<ul>'+p.split('\n').filter(l=>l.match(/^[-*]\s/)).map(l=>'<li>'+esc(l.replace(/^[-*]\s/,''))+'</li>').join('')+'</ul>';if(p.match(/^\d+\.\s/m))return'<ol>'+p.split('\n').filter(l=>l.match(/^\d+\.\s/)).map(l=>'<li>'+esc(l.replace(/^\d+\.\s/,''))+'</li>').join('')+'</ol>';return'<p>'+esc(p).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>')+'</p>'}).join('\n')}
function htmlToMd(html){const t=document.createElement('div');t.innerHTML=html;function walk(n){if(n.nodeType===3)return n.textContent;if(n.nodeType!==1)return'';const c=Array.from(n.childNodes).map(walk).join('');const tag=n.nodeName.toLowerCase();if(tag==='h1')return'\n# '+c+'\n\n';if(tag==='h2')return'\n## '+c+'\n\n';if(tag==='h3')return'\n### '+c+'\n\n';if(tag==='strong'||tag==='b')return'**'+c+'**';if(tag==='em'||tag==='i')return'*'+c+'*';if(tag==='code')return'`'+c+'`';if(tag==='blockquote')return'\n> '+c+'\n\n';if(tag==='li')return'- '+c+'\n';if(tag==='ul'||tag==='ol')return'\n'+c+'\n';if(tag==='p'||tag==='div')return c+'\n\n';if(tag==='br')return'\n';if(tag==='a')return'['+c+']('+(n.getAttribute('href')||'')+')';return c}return walk(t).replace(/\n{3,}/g,'\n\n').trim()}

// formula evaluator
function evalFormula(expr,cells,seen){
  expr=expr.trim();if(!expr.startsWith('='))return expr;
  let f=expr.slice(1);
  try{
    // expand cell refs / ranges
    f=f.replace(/([A-Z]+\d+):([A-Z]+\d+)/g,(m,a,b)=>{const arr=expandRange(a,b);return'['+arr.map(c=>cellVal(c,cells,seen)).join(',')+']'});
    f=f.replace(/\b([A-Z]+\d+)\b/g,(m,r)=>cellVal(r,cells,seen));
    // functions
    const fns={SUM:a=>a.flat().reduce((s,x)=>s+(+x||0),0),AVG:a=>{const flat=a.flat().map(x=>+x||0);return flat.length?flat.reduce((s,x)=>s+x,0)/flat.length:0},MIN:a=>Math.min(...a.flat().map(x=>+x||0)),MAX:a=>Math.max(...a.flat().map(x=>+x||0)),COUNT:a=>a.flat().filter(x=>x!==''&&!isNaN(+x)).length,COUNTA:a=>a.flat().filter(x=>x!=='').length,IF:(c,a,b)=>c?a:b,ROUND:(x,d)=>{const m=Math.pow(10,d||0);return Math.round((+x||0)*m)/m},ABS:x=>Math.abs(+x||0),SQRT:x=>Math.sqrt(+x||0),CONCAT:(...a)=>a.flat().map(x=>String(x)).join(''),NOW:()=>new Date().toISOString(),TODAY:()=>new Date().toISOString().slice(0,10),LEN:s=>String(s).length,UPPER:s=>String(s).toUpperCase(),LOWER:s=>String(s).toLowerCase()};
    const sandbox=new Function(...Object.keys(fns),'return '+f);
    const r=sandbox(...Object.values(fns));
    if(r===undefined||r===null)return'';
    if(typeof r==='number'){if(isNaN(r))return'#NUM';if(!isFinite(r))return'#DIV/0';return Math.round(r*1e10)/1e10}
    return r;
  }catch(e){return'#ERR'}
}
function cellVal(ref,cells,seen){if(seen.has(ref))return 0;seen.add(ref);const v=cells[ref];if(v==null||v==='')return 0;if(v.startsWith('=')){const r=evalFormula(v,cells,seen);return isNaN(+r)?JSON.stringify(String(r)):+r}return isNaN(+v)?JSON.stringify(v):+v}
function expandRange(a,b){const ma=a.match(/([A-Z]+)(\d+)/),mb=b.match(/([A-Z]+)(\d+)/);if(!ma||!mb)return[];const c1=ma[1].charCodeAt(0),c2=mb[1].charCodeAt(0),r1=+ma[2],r2=+mb[2];const out=[];for(let c=c1;c<=c2;c++)for(let r=r1;r<=r2;r++)out.push(String.fromCharCode(c)+r);return out}

function newDeck(title,body){const d={id:uid(),title:title||'untitled deck',slides:[{title:title||'New deck',body:body||'click to edit'}],created:now(),updated:now()};state.slides.decks.push(d);state.slides.activeId=d.id;state.slides.activeIdx=0;state.active='slides';saveAll();render()}

function exportDeck(){const d=state.slides.decks.find(x=>x.id===state.slides.activeId);if(!d)return;const slides=d.slides.map((s,i)=>{const body=s.body.split('\n').map(l=>l.trim().startsWith('- ')?`<li>${esc(l.trim().slice(2))}</li>`:`<p>${esc(l)}</p>`).join('');return`<section data-i="${i}"><h1>${esc(s.title)}</h1><div class="body">${s.body.includes('- ')?'<ul>'+body+'</ul>':body}</div></section>`}).join('');const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(d.title)}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0b0a0f;color:#e6e1d6;font-family:Georgia,serif;height:100vh;overflow:hidden}section{display:none;height:100vh;padding:8vh 8vw;flex-direction:column;justify-content:center}section.on{display:flex}h1{font-size:5vw;color:#ff8c00;margin-bottom:4vh}.body{font-size:2.4vw;line-height:1.55}ul{padding-left:5vw}li{margin-bottom:1.5vh}.nav{position:fixed;bottom:2vh;right:2vw;font-family:monospace;color:#a8a395;font-size:13px}</style></head><body><div id="d">${slides}</div><div class="nav"><span id="ci">1</span>/${d.slides.length} · ← → space</div><script>let i=0;const s=document.querySelectorAll('section');function go(n){i=(n+s.length)%s.length;s.forEach((x,k)=>x.classList.toggle('on',k===i));document.getElementById('ci').textContent=i+1}go(0);document.onkeydown=e=>{if(e.key==='ArrowRight'||e.key===' ')go(i+1);if(e.key==='ArrowLeft')go(i-1)}<\/script></body></html>`;downloadFile(slug(d.title)+'-deck.html',html,'text/html')}

function viewCal(){
  const d=new Date();if(state.cal.year==null){state.cal.year=d.getFullYear();state.cal.month=d.getMonth()}
  const y=state.cal.year,m=state.cal.month;
  const first=new Date(y,m,1),last=new Date(y,m+1,0),start=new Date(first);start.setDate(1-((first.getDay()+6)%7));
  const cells=[];for(let i=0;i<42;i++){const cd=new Date(start);cd.setDate(start.getDate()+i);cells.push(cd)}
  const monthName=first.toLocaleString('en-GB',{month:'long',year:'numeric'});
  const today=new Date();today.setHours(0,0,0,0);
  const grid=cells.map(cd=>{const isCur=cd.getMonth()===m;const isToday=cd.getTime()===today.getTime();const evs=state.cal.events.filter(e=>{const ed=new Date(e.date);return ed.getFullYear()===cd.getFullYear()&&ed.getMonth()===cd.getMonth()&&ed.getDate()===cd.getDate()});return`<div class="cal-cell ${isCur?'':'other-month'} ${isToday?'today':''}" onclick="openModal('event','${cd.toISOString().slice(0,10)}')"><div class="d">${cd.getDate()}</div>${evs.map(e=>`<div class="ev" title="${esc(e.title)}">${esc(e.time||'')} ${esc(e.title)}</div>`).join('')}</div>`}).join('');
  $('#view').innerHTML=`
    <div class="view">
      <div class="view-hd">
        <div><h2>Calendar</h2><div class="sub">${state.cal.events.length} event${state.cal.events.length===1?'':'s'} · click a day to add · export ICS</div></div>
        <div class="actions">
          <button class="btn sm" onclick="navMonth(-1)">←</button>
          <div style="font-family:var(--serif);font-size:14px;padding:0 12px;align-self:center">${monthName}</div>
          <button class="btn sm" onclick="navMonth(1)">→</button>
          <button class="btn sm" onclick="goToday()">today</button>
          <button class="btn primary" onclick="openModal('event')">+ event</button>
          <button class="btn sm" onclick="exportICS()">↓ .ics</button>
        </div>
      </div>
      <div class="cal-header"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
      <div class="cal-grid">${grid}</div>
    </div>`;
}
function navMonth(d){state.cal.month+=d;if(state.cal.month<0){state.cal.month=11;state.cal.year--}if(state.cal.month>11){state.cal.month=0;state.cal.year++}saveAll();render()}
function goToday(){const d=new Date();state.cal.year=d.getFullYear();state.cal.month=d.getMonth();saveAll();render()}
function exportICS(){const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//FallOffice//EN','CALSCALE:GREGORIAN'];state.cal.events.forEach(e=>{const dt=e.date.replace(/-/g,'');const ts=(e.time||'09:00').replace(':','')+'00';ics.push('BEGIN:VEVENT','UID:'+e.id+'@falloffice','DTSTAMP:'+new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z','DTSTART:'+dt+'T'+ts,'SUMMARY:'+e.title,(e.notes?'DESCRIPTION:'+e.notes.replace(/\n/g,'\\n'):''),'END:VEVENT')});ics.push('END:VCALENDAR');downloadFile('falloffice-calendar.ics',ics.filter(Boolean).join('\r\n'),'text/calendar')}

  $('#taskList').innerHTML=ts.length?ts.map(t=>`<div class="task-card p${t.priority||3} ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}')"><div><div class="title">${esc(t.title)}</div>${t.project||t.due?`<div class="meta">${t.project?'#'+esc(t.project):''} ${t.due?'· due '+esc(t.due):''}</div>`:''}</div><div><button class="btn sm danger" onclick="rmTask('${t.id}')">×</button></div></div>`).join(''):'<div class="empty">no tasks</div>';

function addTask(p){const t={id:uid(),title:'',priority:3,due:'',project:'',done:false,...(p||{}),created:now()};state.tasks.tasks.push(t);state.active='tasks';saveAll();render()}
function toggleTask(id){const t=state.tasks.tasks.find(x=>x.id===id);t.done=!t.done;t.updated=now();saveAll();renderTaskList()}

function saveSettings(){state.settings.rateTier=$('#stRate').value;state.settings.anthropicKey=$('#stAnth').value;state.settings.geminiKey=$('#stGem').value;state.settings.openaiKey=$('#stOAI').value;state.settings.openrouterKey=$('#stOR').value;Cascade._p=undefined;saveAll();updateTierBadge();closeModal();toast('settings saved')}
function saveEvent(){const e={id:uid(),title:$('#eTitle').value.trim(),date:$('#eDate').value,time:$('#eTime').value,notes:$('#eNotes').value,created:now()};if(!e.title){toast('title required');return}state.cal.events.push(e);saveAll();closeModal();toast('event added');render()}
function saveTask(){const t={id:uid(),title:$('#tTitle').value.trim(),project:$('#tProj').value,due:$('#tDue').value,priority:+$('#tPri').value,done:false,created:now()};if(!t.title){toast('title required');return}state.tasks.tasks.push(t);saveAll();closeModal();toast('task added');viewTasks()}

// ── export / import all ──
function exportAll(){downloadFile('falloffice-export-'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify({schema:'falloffice@'+VERSION,exported:new Date().toISOString(),state},null,2),'application/json');toast('exported')}
function importAll(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=async e=>{const f=e.target.files[0];if(!f)return;const text=await f.text();try{const d=JSON.parse(text);if(d.state&&confirm('replace ALL local data with import?')){state=Object.assign({},getDefaults(),d.state);state.active='words';await saveAll();closeModal();render();toast('imported')}}catch(err){alert('invalid import: '+err.message)}};i.click()}

// ── util ──
function downloadFile(name,content,mime){const blob=new Blob([content],{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function slug(s){return String(s||'untitled').toLowerCase().replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'').slice(0,50)||'untitled'}

// ════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════
function showApp(name){state.active=name;saveAll();render()}
function render(){
  $('#appNav').innerHTML=APPS.map(a=>`<button class="${state.active===a.id?'active':''}" onclick="showApp('${a.id}')"><span class="ico">${a.ico}</span>${a.name}</button>`).join('');
  ({words:viewWords,sheets:viewSheets,slides:viewSlides,mail:viewMail,cal:viewCal,notes:viewNotes,tasks:viewTasks})[state.active]();
}

// ── keyboard ──
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openPalette()}
  if(e.key==='Escape'){closePalette();closeModal()}
  if($('#palette').classList.contains('open')){
    if(e.key==='Enter'){e.preventDefault();executeIntent()}
  }
});
document.addEventListener('input',e=>{if(e.target.id==='pInput')renderPaletteSuggestions(e.target.value)});
document.addEventListener('click',e=>{if(e.target.id==='palette')closePalette();if(e.target.id==='modal')closeModal()});

// ── KONOMI · sovereign tier (inert per doctrine §12) ──
window.KONOMI={active:true,tier:'sovereign',prime:PRIME,check:()=>({ok:true,tier:'sovereign'})};

// ── FALLMESH ──
try{const sig=new BroadcastChannel('fall-signal');sig.postMessage({source:'falloffice',type:'hello',prime:PRIME,version:VERSION,ts:Date.now()});sig.addEventListener('message',e=>{const m=e.data;if(m&&m.type==='ping')sig.postMessage({source:'falloffice',type:'pong',prime:PRIME})})}catch(e){}

// ── postMessage API ──
window.addEventListener('message',async e=>{const m=e.data;if(!m||m.target!=='falloffice'||!m.action)return;let r=null;if(m.action==='ping')r={ok:true,prime:PRIME,version:VERSION,apps:APPS.map(a=>a.id)};else if(m.action==='create'&&m.app&&APPS.find(a=>a.id===m.app)){switch(m.app){case'words':newDoc(m.title,m.body);break;case'sheets':newSheet(m.title,m.body);break;case'slides':newDeck(m.title,m.body);break;case'mail':newDraft(m.params||{});break;case'notes':newNote(m.params||{});break;case'tasks':addTask(m.params||{});break}r={ok:true}}e.source?.postMessage({target:m.source||'*',responseTo:m.action,data:r},'*')});

// ── boot ──
(async function(){await openDB();await loadAll();await updateTierBadge();if(!state.active||!APPS.find(a=>a.id===state.active))state.active='words';render();})();
</script>
</body>
</html>
